<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 400" role="img" aria-label="Turf Revival Pros">
  <defs>
    <radialGradient id="greenFill" cx="50%" cy="35%" r="72%">
      <stop offset="0%" stop-color="#66BB6A"/>
      <stop offset="50%" stop-color="#2E7D32"/>
      <stop offset="100%" stop-color="#0F3D12"/>
    </radialGradient>
    <linearGradient id="shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="flagFill" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#E8F5E9"/>
    </linearGradient>
  </defs>

  <!-- ICON centered top -->
  <g transform="translate(100, 20)">
    <circle cx="80" cy="80" r="78" fill="url(#greenFill)"/>
    <ellipse cx="80" cy="42" rx="60" ry="28" fill="url(#shine)"/>
    <path d="M 14 96 Q 80 78 146 96" stroke="#0F3D12" stroke-width="1" fill="none" opacity="0.25"/>
    <ellipse cx="80" cy="116" rx="20" ry="5.5" fill="#0A1F0C"/>
    <rect x="78.5" y="28" width="3" height="88" fill="#FAFAFA" rx="1.5"/>
    <circle cx="80" cy="28" r="3" fill="#FAFAFA"/>
    <path d="M 81.5 30 L 132 42 L 81.5 58 Z" fill="url(#flagFill)"/>
  </g>

  <!-- WORDMARK -->
  <g transform="translate(180, 240)" text-anchor="middle">
    <text x="0" y="44" font-family="Inter, 'Helvetica Neue', system-ui, sans-serif"
          font-size="56" font-weight="900" fill="#1B5E20" letter-spacing="-1.5">TURF REVIVAL</text>
    <line x1="-130" y1="82" x2="-55" y2="82" stroke="#1976D2" stroke-width="2"/>
    <text x="0" y="92" font-family="Inter, 'Helvetica Neue', system-ui, sans-serif"
          font-size="24" font-weight="700" fill="#1976D2" letter-spacing="12">PROS</text>
    <line x1="55" y1="82" x2="130" y2="82" stroke="#1976D2" stroke-width="2"/>
    <text x="0" y="130" font-family="Inter, 'Helvetica Neue', system-ui, sans-serif"
          font-size="13" font-weight="600" fill="#5A6B5C" letter-spacing="5">DENVER METRO · PARKER CO</text>
  </g>
</svg>
